root = "."
testdata_dir = "testdata"
tmp_dir = ".gen/tmp"

[build]
args_bin = []
bin = ".gen/tmp/main.exe"
cmd = "go build -tags dev,trace -o .gen/tmp/main.exe ."
delay = 50
exclude_dir = ["app/dist", "app/node_modules", ".gen", ".git", ".github", "lib/core/ssr/app"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "svelte", "js", "ts", "json"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = [
  "cd app && ../.gen/bun/bun x vite build --logLevel=info --outDir=dist/client --emptyOutDir=true",
  "cd app && ../.gen/bun/bun x vite build --logLevel=info --outDir=dist/server --emptyOutDir=true --ssr=app.server.ts",
  "cd app && ./node_modules/.bin/esbuild --bundle --outfile=dist/server/app.server.cjs --format=cjs --allow-overwrite dist/server/app.server.js",
]
rerun = false
rerun_delay = 50
send_interrupt = true
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = false

[proxy]
app_port = 0
enabled = false
proxy_port = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
